<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ماجد — «نور» · لايت + دارك</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box}
  body{margin:0;font-family:"Tajawal","Cairo",sans-serif;
    background:linear-gradient(180deg,#e9edf5,#dfe5f0);min-height:100dvh;
    display:grid;place-items:center;padding:26px 16px}
  .wrap{display:flex;flex-direction:column;align-items:center;gap:14px}
  .hint{font-size:12.5px;color:#5b6678;text-align:center;max-width:392px;line-height:1.7}
  .hint b{color:#2d3550}

  /* ===================== THEME TOKENS ===================== */
  .win{width:392px;max-width:100%;height:646px;border-radius:26px;overflow:hidden;
    display:flex;flex-direction:column;position:relative;
    box-shadow:0 28px 70px rgba(15,30,66,.22);transition:background .3s,color .3s}

  .win[data-theme="light"]{
    --bg:radial-gradient(560px 300px at 88% -6%,rgba(124,92,255,.12),transparent 60%),
         radial-gradient(520px 300px at 0% 104%,rgba(6,182,212,.10),transparent 60%),#f7f8fc;
    --surface:#ffffff; --surface-2:#f3f4fa; --line:#ebedf4; --head-bd:#eef0f6;
    --text:#171b2e; --muted:#6b7280; --soft:#8b90a3;
    --card:#ffffff; --card-bd:#ececf4; --card-hover:rgba(124,92,255,.07); --card-hover-bd:rgba(124,92,255,.4);
    --bubble-bot:#ffffff; --bubble-bot-bd:#ececf4;
    --bar:#ffffff; --bar-bd:#eef0f6; --pill:#f6f7fb; --pill-bd:#e9ebf3; --pill-tx:#2d3550;
    --wa:#1fa855; --wa-bg:rgba(31,168,85,.10); --wa-bd:rgba(31,168,85,.28);
  }
  .win[data-theme="dark"]{
    --bg:radial-gradient(600px 320px at 86% -8%,rgba(124,92,255,.35),transparent 60%),
         radial-gradient(520px 300px at 0% 102%,rgba(34,211,238,.20),transparent 60%),#0e1326;
    --surface:rgba(255,255,255,.05); --surface-2:rgba(255,255,255,.06); --line:rgba(255,255,255,.09); --head-bd:rgba(255,255,255,.08);
    --text:#e9edf8; --muted:#9aa3bd; --soft:#7e87a3;
    --card:rgba(255,255,255,.05); --card-bd:rgba(255,255,255,.10); --card-hover:rgba(124,92,255,.18); --card-hover-bd:rgba(124,92,255,.55);
    --bubble-bot:rgba(255,255,255,.06); --bubble-bot-bd:rgba(255,255,255,.10);
    --bar:rgba(255,255,255,.04); --bar-bd:rgba(255,255,255,.08); --pill:rgba(255,255,255,.05); --pill-bd:rgba(255,255,255,.11); --pill-tx:#e9edf8;
    --wa:#7ff0a8; --wa-bg:rgba(37,211,102,.16); --wa-bd:rgba(37,211,102,.4);
  }
  .win{background:var(--bg);color:var(--text)}

  /* ===================== HEADER ===================== */
  .hd{display:flex;align-items:center;gap:11px;padding:14px 15px;border-bottom:1px solid var(--head-bd)}
  .av{width:40px;height:40px;border-radius:13px;object-fit:cover;border:1px solid var(--line);flex-shrink:0}
  .nm{line-height:1.25;min-width:0}
  .nm b{font-size:15.5px;font-weight:800}
  .nm s{display:block;text-decoration:none;font-size:11.5px;color:#16a34a;margin-top:1px}
  .win[data-theme="dark"] .nm s{color:#7df3c4}
  .nm s i{display:inline-block;width:6px;height:6px;border-radius:50%;background:currentColor;margin-inline-end:4px;vertical-align:middle}
  .htools{margin-inline-start:auto;display:flex;align-items:center;gap:6px}
  .tbtn{width:36px;height:36px;border-radius:10px;border:1px solid var(--line);background:var(--surface);
    color:var(--muted);display:grid;place-items:center;cursor:pointer;transition:background .15s,color .15s,transform .12s}
  .tbtn:hover{color:var(--text)}.tbtn:active{transform:scale(.93)}
  .tbtn:focus-visible{outline:2px solid #7c5cff;outline-offset:2px}
  .tbtn svg{width:18px;height:18px}

  /* ===================== PINNED CONTACT BAR (under header) ===================== */
  .cbar{display:flex;gap:8px;padding:10px 14px;background:var(--bar);border-bottom:1px solid var(--bar-bd);
    backdrop-filter:blur(6px)}
  .cb{flex:1;display:flex;align-items:center;justify-content:center;gap:7px;height:40px;border-radius:11px;
    font:inherit;font-size:12.5px;font-weight:700;cursor:pointer;text-decoration:none;
    background:var(--pill);border:1px solid var(--pill-bd);color:var(--pill-tx);
    transition:transform .14s,background .16s,border-color .16s,box-shadow .16s}
  .cb:hover{transform:translateY(-1px);box-shadow:0 6px 16px rgba(60,70,110,.12)}
  .cb:active{transform:scale(.97)}
  .cb:focus-visible{outline:2px solid #7c5cff;outline-offset:2px}
  .cb svg{width:16px;height:16px}
  .cb.wa{background:var(--wa-bg);border-color:var(--wa-bd);color:var(--wa)}
  .cb.vo{opacity:.62}
  .cb .dot{font-size:9px;font-weight:800;background:#f59e0b;color:#fff;border-radius:999px;padding:1px 6px;margin-inline-start:2px}

  /* ===================== BODY ===================== */
  .bd{flex:1;overflow-y:auto;padding:18px 16px 10px;display:flex;flex-direction:column;gap:13px;
    scrollbar-width:thin;scrollbar-color:rgba(130,140,165,.4) transparent}
  .bd::-webkit-scrollbar{width:6px}.bd::-webkit-scrollbar-thumb{background:rgba(130,140,165,.4);border-radius:99px}

  /* empty state */
  .hero{text-align:center;margin-top:8px}
  .hero .orb{width:66px;height:66px;border-radius:20px;margin:0 auto 12px;object-fit:cover;display:block;
    box-shadow:0 0 0 1px var(--line),0 16px 42px rgba(124,92,255,.4)}
  .hero h2{margin:0 0 5px;font-size:20px;font-weight:800;
    background:linear-gradient(90deg,#7c5cff,#06b6d4);-webkit-background-clip:text;background-clip:text;color:transparent}
  .hero p{margin:0;font-size:12.5px;color:var(--muted);line-height:1.7;padding:0 8px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:14px}
  .sg{background:var(--card);border:1px solid var(--card-bd);border-radius:14px;padding:12px;cursor:pointer;text-align:start;
    transition:transform .14s,background .16s,border-color .16s;font:inherit}
  .sg:hover{background:var(--card-hover);border-color:var(--card-hover-bd);transform:translateY(-2px)}
  .sg:active{transform:scale(.98)}
  .sg:focus-visible{outline:2px solid #7c5cff;outline-offset:2px}
  .sg .t{font-size:13px;font-weight:800;color:var(--text)}
  .sg .d{font-size:11px;color:var(--muted);margin-top:2px}

  /* conversation */
  .row{display:flex;gap:8px;align-items:flex-end;max-width:88%;animation:rise .35s ease both}
  .row.bot{align-self:flex-start}.row.me{align-self:flex-end}
  @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .mini{width:27px;height:27px;border-radius:9px;object-fit:cover;flex-shrink:0;border:1px solid var(--line)}
  .bub{font-size:14px;line-height:1.75;padding:11px 14px;border-radius:16px}
  .bot .bub{background:var(--bubble-bot);border:1px solid var(--bubble-bot-bd);border-bottom-right-radius:6px;color:var(--text)}
  .me .bub{background:linear-gradient(135deg,#7c5cff,#06b6d4);color:#fff;border-bottom-left-radius:6px;
    box-shadow:0 8px 20px rgba(124,92,255,.3)}
  .tdots{display:inline-flex;gap:5px;padding:14px 16px;background:var(--bubble-bot);border:1px solid var(--bubble-bot-bd);
    border-radius:16px;border-bottom-right-radius:6px}
  .tdots i{width:7px;height:7px;border-radius:50%;background:var(--soft);animation:blink 1.3s infinite}
  .tdots i:nth-child(2){animation-delay:.2s}.tdots i:nth-child(3){animation-delay:.4s}
  @keyframes blink{0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-3px)}}

  .hide{display:none!important}

  /* ===================== INPUT ===================== */
  .ip{padding:12px 14px;border-top:1px solid var(--head-bd);display:flex;align-items:center;gap:9px;background:var(--bar)}
  .box{flex:1;display:flex;align-items:center;gap:8px;background:var(--surface-2);border:1px solid var(--line);
    border-radius:999px;padding:0 6px 0 15px;height:46px;transition:border-color .16s,box-shadow .16s}
  .box:focus-within{border-color:#7c5cff;box-shadow:0 0 0 4px rgba(124,92,255,.18)}
  .box input{flex:1;background:transparent;border:0;outline:none;color:var(--text);font:inherit;font-size:13.5px}
  .box input::placeholder{color:var(--soft)}
  .snd{width:42px;height:42px;border-radius:50%;border:0;cursor:pointer;display:grid;place-items:center;color:#fff;
    background:linear-gradient(135deg,#7c5cff,#06b6d4);box-shadow:0 8px 22px rgba(124,92,255,.45);transition:transform .14s}
  .snd:hover{transform:scale(1.06)}.snd:active{transform:scale(.94)}
  .snd:focus-visible{outline:2px solid #7c5cff;outline-offset:2px}
  .snd svg{width:18px;height:18px;transform:scaleX(-1)}
  .credit{text-align:center;font-size:10.5px;color:var(--soft);padding:7px 0 10px;background:var(--bar);font-weight:600}

  @media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
  <div class="wrap">
    <div class="win" id="win" data-theme="light" role="dialog" aria-label="محادثة ماجد">
      <!-- Header -->
      <header class="hd">
        <img class="av" src="assets/majed-avatar.png" alt="ماجد"/>
        <div class="nm"><b>ماجد</b><s><i></i>متاح الآن</s></div>
        <div class="htools">
          <button class="tbtn" id="themeBtn" title="تبديل الثيم" aria-label="تبديل الثيم">
            <!-- moon (shown in light → switch to dark) -->
            <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
          </button>
          <button class="tbtn" aria-label="قائمة"><svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="12" cy="19" r="2"/></svg></button>
        </div>
      </header>

      <!-- Pinned contact bar (always visible during chat) -->
      <nav class="cbar" aria-label="طرق التواصل">
        <a class="cb wa" href="https://wa.me/966920016295" target="_blank" rel="noopener" aria-label="واتساب">
          <svg viewBox="0 0 32 32" fill="currentColor"><path d="M16 2C8.3 2 2 8.3 2 16c0 2.5.7 4.9 1.8 7L2 30l7.3-1.8A14 14 0 1016 2zm6.3 17c-.3-.2-2-1-2.4-1.1-.3-.1-.5-.2-.8.2s-.9 1.1-1.1 1.4c-.2.2-.4.3-.7.1-1.8-.7-3.3-2-4.5-3.8-.2-.4 0-.5.2-.7l.5-.6c.2-.2.2-.4.4-.6.1-.2 0-.5 0-.6l-1-2.5c-.3-.6-.5-.5-.7-.5h-.6c-.2 0-.6.1-.9.4-1 1-1.2 2.3-.8 3.7.5 1.6 1.6 3 3 4.3 2 1.7 3.7 2.2 4.4 2.3.7.1 1.6 0 2.1-.6.3-.4.5-.9.4-1.2z"/></svg>
          واتساب
        </a>
        <a class="cb" href="mailto:aibot@engosoft.com" aria-label="إيميل">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 6 10 7L22 6"/></svg>
          إيميل
        </a>
        <button class="cb vo" type="button" aria-label="ماجد فويس قريبًا">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/></svg>
          فويس <span class="dot">قريبًا</span>
        </button>
      </nav>

      <!-- Body -->
      <main class="bd" id="bd">
        <!-- empty state -->
        <section id="hero">
          <div class="hero">
            <img class="orb" src="assets/majed-avatar.png" alt=""/>
            <h2>أهلاً، أنا ماجد</h2>
            <p>مستشارك التعليمي في Engosoft — ابدأ من اقتراح أو اكتب سؤالك</p>
          </div>
          <div class="grid">
            <button class="sg" data-q="عايز أعرف باقي لي كام درس"><div class="t">📊 تقدّمي</div><div class="d">باقي لي كام درس؟</div></button>
            <button class="sg" data-q="إيه الدرس الجاي؟"><div class="t">▶️ الدرس الجاي</div><div class="d">إيه اللي بعده؟</div></button>
            <button class="sg" data-q="عرّفني بدوراتي المسجّل فيها"><div class="t">🎓 دوراتي</div><div class="d">المسارات المسجّل فيها</div></button>
            <button class="sg" data-q="عايز أكلّم موظف"><div class="t">🧑‍💼 موظف</div><div class="d">أكلّم فريق الدعم</div></button>
          </div>
        </section>
      </main>

      <!-- Input -->
      <div class="ip">
        <div class="box"><input id="msg" type="text" placeholder="اكتب رسالتك لماجد..." aria-label="رسالة"/></div>
        <button class="snd" id="send" aria-label="إرسال"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4z"/><path d="M22 2 11 13"/></svg></button>
      </div>
      <div class="credit">مدعوم بواسطة Engosoft</div>
    </div>

    <p class="hint">جرّب: بدّل <b>الثيم</b> من زرار القمر/الشمس فوق · دوس اقتراح أو ابعت رسالة وشوف إزاي <b>شريط التواصل فوق</b> بيفضل ثابت طول المحادثة.</p>
  </div>

<script>
  // ---- theme toggle (light default) ----
  const win=document.getElementById('win'), tIcon=document.getElementById('themeIcon');
  const moon='<path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/>';
  const sun='<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>';
  document.getElementById('themeBtn').addEventListener('click',()=>{
    const dark=win.getAttribute('data-theme')==='dark';
    win.setAttribute('data-theme',dark?'light':'dark');
    tIcon.innerHTML=dark?moon:sun;
  });

  // ---- chat demo: empty state -> conversation, contact bar persists ----
  const bd=document.getElementById('bd'), hero=document.getElementById('hero'), input=document.getElementById('msg');
  function t(){const d=new Date();let h=d.getHours(),m=d.getMinutes();const ap=h>=12?'م':'ص';h=h%12||12;return `${h}:${m<10?'0'+m:m} ${ap}`;}
  function botRow(html){const r=document.createElement('div');r.className='row bot';
    r.innerHTML='<img class="mini" src="assets/majed-avatar.png" alt=""/><div class="bub"></div>';
    r.querySelector('.bub').innerHTML=html;return r;}
  function meRow(text){const r=document.createElement('div');r.className='row me';
    const b=document.createElement('div');b.className='bub';b.textContent=text;r.appendChild(b);return r;}
  function reply(q){
    const typing=document.createElement('div');typing.className='row bot';
    typing.innerHTML='<img class="mini" src="assets/majed-avatar.png" alt=""/><div class="tdots"><i></i><i></i><i></i></div>';
    bd.appendChild(typing);bd.scrollTop=bd.scrollHeight;
    setTimeout(()=>{typing.remove();
      let ans='تمام، بقولك حالًا 👍';
      if(/درس|تقدم/.test(q)) ans='باقي لك <strong>7 دروس</strong> في المسار 👍 تحب أحجزلك تذكير للدرس الجاي؟';
      else if(/موظف|دعم/.test(q)) ans='تمام 🙌 بوصّلك بزميل من فريقنا حالًا.';
      else if(/دورات|مسجل/.test(q)) ans='أنت مسجّل في <strong>مسار التصميم الداخلي</strong> و<strong>أساسيات الأوتوكاد</strong> 🎓';
      bd.appendChild(botRow(ans));bd.scrollTop=bd.scrollHeight;},1100);
  }
  function send(text){
    if(hero){hero.classList.add('hide');}
    bd.appendChild(meRow(text));bd.scrollTop=bd.scrollHeight;reply(text);
  }
  document.querySelectorAll('.sg').forEach(s=>s.addEventListener('click',()=>send(s.dataset.q)));
  function fromInput(){const v=input.value.trim();if(!v)return;send(v);input.value='';}
  document.getElementById('send').addEventListener('click',fromInput);
  input.addEventListener('keydown',e=>{if(e.key==='Enter')fromInput();});
</script>
</body>
</html>
