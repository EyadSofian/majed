<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>الشكل المحترف — أيقونات الهيدر</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
  :root{--blue:#1267f5;--cyan:#0ea5e9;--green:#19c37d;--wa:#25d366;--ink:#16233a;--muted:#667085;--line:#eef0f4}
  *{box-sizing:border-box}
  body{margin:0;font-family:"Cairo",system-ui,sans-serif;
    background:linear-gradient(135deg,rgba(18,103,245,.12),rgba(25,195,125,.08) 40%,rgba(245,158,11,.06)),#eef3fb;
    min-height:100dvh;display:grid;place-items:center;padding:24px}
  .win{width:380px;max-width:100%;height:600px;background:#fff;border-radius:22px;overflow:hidden;
    box-shadow:0 30px 90px rgba(15,23,42,.22);display:flex;flex-direction:column;border:1px solid #fff}

  /* ===== Header: أيقونات متناسقة ===== */
  .hd{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 14px;
    background:#fff;border-bottom:1px solid var(--line)}
  .hd .id{display:flex;align-items:center;gap:10px}
  .hd .av{width:42px;height:42px;border-radius:50%;object-fit:cover;border:2px solid #fff;
    box-shadow:0 4px 12px rgba(15,23,42,.12);background:linear-gradient(135deg,var(--blue),var(--cyan));
    display:flex;align-items:center;justify-content:center;color:#fff}
  .hd .nm strong{font-size:16px;color:var(--ink);display:block;line-height:1.2}
  .hd .nm .on{font-size:11.5px;color:var(--green);display:flex;align-items:center;gap:4px;margin-top:2px}
  .hd .nm .on i{width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block}
  .hd .tools{display:flex;align-items:center;gap:2px}
  /* زرار أيقونة موحّد: 40px تاب، 20px أيقونة، نفس اللون والسُمك */
  .ib{width:40px;height:40px;display:grid;place-items:center;border-radius:11px;border:0;background:transparent;
    color:#5a6677;cursor:pointer;text-decoration:none;transition:background .15s,color .15s,transform .12s}
  .ib:hover{background:#f1f4f9;color:var(--ink)}
  .ib:active{transform:scale(.93)}
  .ib.majed{color:var(--blue)}
  .ib.majed:hover{background:rgba(18,103,245,.10)}
  .ib svg{width:20px;height:20px}

  /* ===== Body ===== */
  .bd{flex:1;padding:18px 16px;overflow:auto;background:#f7f9fc;display:flex;flex-direction:column;gap:10px}
  .m{max-width:86%;padding:11px 14px;border-radius:16px;font-size:14px;line-height:1.7}
  .m.bot{align-self:flex-start;background:#fff;color:var(--ink);border:1px solid var(--line);border-top-right-radius:6px;box-shadow:0 2px 8px rgba(15,23,42,.04)}
  .m.me{align-self:flex-end;background:linear-gradient(135deg,var(--blue),var(--cyan));color:#fff;border-top-left-radius:6px}

  /* ===== Input: واتساب في الجنب + إرسال ===== */
  .ip{display:flex;align-items:center;gap:8px;padding:10px 12px;border-top:1px solid var(--line);background:#fff}
  .wa{width:40px;height:40px;border-radius:50%;display:grid;place-items:center;flex-shrink:0;
    background:var(--wa);color:#fff;text-decoration:none;box-shadow:0 6px 16px rgba(37,211,102,.28);transition:transform .12s}
  .wa:hover{transform:scale(1.06)}
  .wa svg{width:20px;height:20px}
  .fld{flex:1;border:1px solid var(--line);background:#f3f5f9;border-radius:999px;padding:0 16px;height:42px;
    display:flex;align-items:center;color:#98a2b3;font-size:14px}
  .send{width:42px;height:42px;border-radius:50%;flex-shrink:0;border:0;cursor:pointer;display:grid;place-items:center;
    background:linear-gradient(135deg,var(--blue),var(--cyan));color:#fff;box-shadow:0 6px 16px rgba(18,103,245,.30)}
  .send svg{width:19px;height:19px;transform:scaleX(-1)}
  .credit{text-align:center;font-size:11px;color:#aab2c0;padding:7px 0 11px;background:#fff;font-weight:600}
</style>
</head>
<body>
  <div class="win">
    <!-- Header -->
    <div class="hd">
      <div class="id">
        <button class="ib" aria-label="رجوع"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg></button>
        <span class="av"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8z"/></svg></span>
        <span class="nm"><strong>ماجد</strong><span class="on"><i></i>متاح الآن</span></span>
      </div>
      <div class="tools">
        <!-- محادثة جديدة مع ماجد (بدل الريلود) -->
        <button class="ib majed" title="محادثة جديدة مع ماجد" aria-label="محادثة جديدة مع ماجد"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l1.6 4.3L18 9l-4.4 1.7L12 15l-1.6-4.3L6 9l4.4-1.7z"/><path d="M19 14l.8 2.2L22 17l-2.2.8L19 20l-.8-2.2L16 17l2.2-.8z"/></svg></button>
        <!-- إيميل (فوق) -->
        <a class="ib" href="mailto:aibot@engosoft.com" title="راسلنا بالإيميل" aria-label="راسلنا بالإيميل"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 6 10 7L22 6"/></svg></a>
        <!-- إغلاق -->
        <button class="ib" title="إغلاق" aria-label="إغلاق"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
      </div>
    </div>

    <!-- Body -->
    <div class="bd">
      <div class="m bot">أهلاً 👋 أنا ماجد، مستشارك التعليمي في Engosoft. اسألني عن دوراتك، تقدمك، أو الدرس الجاي.</div>
      <div class="m me">عايز أعرف باقي لي كام درس في مسار التصميم الداخلي.</div>
      <div class="m bot">باقي لك 7 دروس 👍 تحب أحجزلك تذكير للدرس الجاي ولا أوصّلك بفريق الدعم؟</div>
    </div>

    <!-- Input -->
    <div class="ip">
      <a class="wa" href="https://wa.me/966920016295" title="تواصل عبر واتساب" aria-label="واتساب"><svg viewBox="0 0 32 32" fill="currentColor"><path d="M16 2C8.3 2 2 8.3 2 16c0 2.5.7 4.9 1.8 7L2 30l7.3-1.8A14 14 0 1016 2zm0 25.6c-2.1 0-4.1-.6-5.9-1.6l-.4-.3-4.3 1.1 1.1-4.2-.3-.4A11.6 11.6 0 1116 27.6zm6.3-8.7c-.3-.2-2-1-2.4-1.1-.3-.1-.5-.2-.8.2s-.9 1.1-1.1 1.4c-.2.2-.4.3-.7.1-.3-.2-1.5-.5-2.8-1.7-1-.9-1.7-2.1-1.9-2.4-.2-.3 0-.5.2-.7l.5-.6.3-.5c.1-.2.1-.4 0-.6L9.9 8.4c-.3-.7-.6-.6-.8-.6h-.7c-.2 0-.6.1-.9.4s-1.2 1.2-1.2 2.9 1.2 3.4 1.4 3.6c.2.2 2.4 3.7 5.9 5.2 2.7 1.2 3.3 1 3.9.9.7-.1 2-.8 2.3-1.6.3-.8.3-1.5.2-1.6z"/></svg></a>
      <span class="fld">اكتب رسالتك...</span>
      <button class="send" title="إرسال" aria-label="إرسال"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4z"/><path d="M22 2 11 13"/></svg></button>
    </div>
    <div class="credit">مدعوم بواسطة Engosoft</div>
  </div>
</body>
</html>
